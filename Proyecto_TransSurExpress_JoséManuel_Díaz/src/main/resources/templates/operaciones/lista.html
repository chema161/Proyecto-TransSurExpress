<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSur Express - Hojas de Ruta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-truck me-2"></i>TransSur Express</a>
            <div class="d-flex gap-2">
                <a th:href="@{/conductores}" class="btn btn-outline-light btn-sm"><i class="bi bi-person-badge"></i> Conductores</a>
                <a th:href="@{/}" class="btn btn-outline-light btn-sm"><i class="bi bi-house-door"></i> Panel Principal</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary mb-0"><i class="bi bi-journal-check me-2"></i>Seguimiento y Planificación de Rutas</h2>
            <a th:href="@{/operaciones/nueva}" class="btn btn-success shadow-sm">
                <i class="bi bi-calendar-plus me-1"></i> Planificar Servicio
            </a>
        </div>

        <div class="card shadow border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0 text-center align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Fecha</th>
                                <th>Código Envío</th>
                                <th>Vehículo Asignado</th>
                                <th>Ubicación Actual</th>
                                <th>Distancia</th>
                                <th>Estado del Envío</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="op : ${operaciones}">
                                <td th:text="${op.fecha}"></td>
                                <td>
                                    <a th:href="@{/operaciones/historial/{envioId}(envioId=${op.envio.id})}" 
                                       th:text="${op.envio.codigo}" 
                                       class="fw-bold text-primary text-decoration-none" 
                                       title="Ver historial de trazabilidad">
                                    </a>
                                </td>
                                <td th:text="${op.vehiculo.matricula}" class="text-uppercase fw-bold text-success"></td>
                                <td th:text="${op.lugar}"></td>
                                <td><span th:text="${op.distancia}"></span> km</td>
                                <td>
                                    <span th:text="${op.estado}" class="badge p-2"
                                          th:classappend="${op.estado.name() == 'PREPARADO' ? 'bg-secondary' : 
                                                           op.estado.name() == 'EN_RUTA' ? 'bg-warning text-dark' : 
                                                           op.estado.name() == 'EN_REPARTO' ? 'bg-info text-dark' : 'bg-success'}">
                                    </span>
                                </td>
                                <td>
                                    <div class="btn-group gap-1">
                                        <a th:href="@{/operaciones/editar/{id}(id=${op.id})}" 
                                           class="btn btn-warning btn-sm shadow-sm" 
                                           title="Actualizar Estado o Asignación">
                                            <i class="bi bi-pencil-square text-dark"></i>
                                        </a>
                                        
                                        <a th:href="@{/operaciones/borrar/{id}(id=${op.id})}" 
                                           class="btn btn-danger btn-sm shadow-sm"
                                           onclick="return confirm('⚠️ ADVERTENCIA LOGÍSTICA ⚠️\n\n¿Estás seguro de que deseas eliminar esta hoja de ruta? Esto desvinculará al paquete del vehículo asignado.');" 
                                           title="Eliminar Operación">
                                            <i class="bi bi-trash-fill"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(operaciones)}">
                                <td colspan="7" class="text-muted p-4">No hay servicios planificados actualmente en tránsito.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
