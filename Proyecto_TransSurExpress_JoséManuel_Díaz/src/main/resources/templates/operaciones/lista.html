<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSur Express - Planificación de Rutas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-truck me-2"></i>TransSur Express
            </a>
            <div class="d-flex gap-2">
                <a th:href="@{/}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-house-door me-1"></i>Volver al inicio
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary mb-0 fw-bold">
                <i class="bi bi-calendar-check me-2"></i>Seguimiento y Planificación de Rutas
            </h2>
			<a th:href="@{/operaciones/nueva}" class="btn btn-success fw-semibold shadow-sm">
			    <i class="bi bi-calendar-plus me-2"></i>Planificar Servicio
			</a>
        </div>

        <div class="card shadow border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0 text-center align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Fecha</th>
                                <th>Código Envío</th>
                                <th>Vehículo Asignado</th>
                                <th>Ubicación Actual</th>
                                <th>Distancia</th>
                                <th>Estado del Envío</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="op : ${operaciones}">
                                <td th:text="${#temporals.format(op.fecha, 'dd/MM/yyyy')}">26/05/2026</td>
                                <td th:text="${op.envio != null ? op.envio.codigo : 'Sin Código'}" class="fw-bold text-primary">ENV-000</td>
                                <td th:text="${op.vehiculo != null ? op.vehiculo.matricula : 'Sin Vehículo'}">1234-BBB</td>
                                <td th:text="${op.ubicacionActual}">Ubicación</td>
                                <td><span th:text="${op.distancia}">0.0</span> km</td>
                                <td>
                                    <span th:text="${op.estadoEnvio}" class="badge bg-warning text-dark p-2">Estado</span>
                                </td>
                                <td>
                                    <a th:href="@{/operaciones/editar/{id}(id=${op.id})}" class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/operaciones/borrar/{id}(id=${op.id})}" class="btn btn-sm btn-outline-danger" 
                                       onclick="return confirm('¿Seguro que quieres eliminar esta planificación?');">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(operaciones)}">
                                <td colspan="7" class="text-muted p-4">No hay servicios planificados actualmente en tránsito.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
