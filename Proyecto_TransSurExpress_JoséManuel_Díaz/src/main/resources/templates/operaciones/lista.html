<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSur Express - Planificación de Rutas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-truck me-2"></i>TransSur Express
            </a>
            <div class="d-flex gap-2">
                <a th:href="@{/conductores}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Conductores
                </a>
                <a th:href="@{/}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-house-door me-1"></i>Inicio
                </a>
                <a th:href="@{/envios}" class="btn btn-outline-light btn-sm">
                    Envíos<i class="bi bi-arrow-right ms-1"></i>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary mb-0 fw-bold">
                <i class="bi bi-calendar-check me-2"></i>Seguimiento y Planificación de Rutas
            </h2>
            <a th:href="@{/operaciones/nueva}" class="btn btn-success fw-semibold shadow-sm">
                <i class="bi bi-calendar-plus me-2"></i>Planificar Servicio
            </a>
        </div>

        <div class="card shadow border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0 text-center align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Fecha</th>
                                <th>Código Envío</th>
                                <th>Vehículo Asignado</th>
                                <th>Lugar / Punto de Control</th>
                                <th>Distancia</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="op : ${operaciones}">
                                <td th:text="${#temporals.format(op.fecha, 'dd/MM/yyyy')}"></td>
                                <td th:text="${op.envio != null ? op.envio.codigo : 'Sin Código'}" class="fw-bold text-primary"></td>
                                <td th:text="${op.vehiculo != null ? op.vehiculo.matricula : 'Sin Vehículo'}"></td>
                                <td th:text="${op.lugar}"></td>
                                <td><span th:text="${op.distancia}"></span> km</td>
                                <td>
                                    <span th:text="${op.estado}"
                                          th:classappend="${op.estado?.name() == 'PREPARADO'}  ? 'bg-secondary' :
                                                          (${op.estado?.name() == 'EN_RUTA'}    ? 'bg-primary'   :
                                                          (${op.estado?.name() == 'EN_REPARTO'} ? 'bg-warning text-dark' :
                                                          (${op.estado?.name() == 'ENTREGADO'}  ? 'bg-success'   : 'bg-secondary')))"
                                          class="badge p-2">
                                    </span>
                                </td>
                                <td>
                                    <a sec:authorize="hasRole('ADMINISTRADOR')"
                                       th:href="@{/operaciones/editar/{id}(id=${op.id})}"
                                       class="btn btn-sm btn-outline-primary" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a sec:authorize="hasRole('ADMINISTRADOR')"
                                       th:href="@{/operaciones/borrar/{id}(id=${op.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('¿Seguro que quieres eliminar esta operación?');" title="Eliminar">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                    <a th:href="@{/operaciones/historial/{id}(id=${op.envio.id})}"
                                       class="btn btn-sm btn-outline-secondary" title="Ver historial del envío">
                                        <i class="bi bi-clock-history"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(operaciones)}">
                                <td colspan="7" class="text-muted p-4">No hay servicios planificados actualmente.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast de notificación -->
    <div th:replace="~{fragments/toast :: notificacion}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
