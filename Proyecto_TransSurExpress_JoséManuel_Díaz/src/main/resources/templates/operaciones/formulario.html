<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSur Express — Planificar Servicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
    <link th:href="@{/css/index.css}" rel="stylesheet">
    <link th:href="@{/css/lista.css}" rel="stylesheet">
</head>
<body data-bs-theme="light">

    <nav class="navbar-dash">
        <div class="container d-flex align-items-center gap-3">
            <a class="nav-brand me-3" th:href="@{/}">
                <i class="bi bi-truck-front-fill"></i>
                TransSur<span class="accent">Express</span>
            </a>
            <div class="d-flex gap-3 flex-wrap">
                <a th:href="@{/envios}"      class="nav-link-pill"><i class="bi bi-box-seam me-1"></i>Envíos</a>
                <a th:href="@{/vehiculos}"   class="nav-link-pill"><i class="bi bi-truck me-1"></i>Vehículos</a>
                <a th:href="@{/conductores}" class="nav-link-pill"><i class="bi bi-person-badge me-1"></i>Conductores</a>
                <a th:href="@{/operaciones}" class="nav-link-pill active"><i class="bi bi-geo-alt me-1"></i>Operaciones</a>
            </div>
            <div class="ms-auto d-flex align-items-center gap-2">
                <span class="nav-user" sec:authorize="isAuthenticated()">
                    <i class="bi bi-person-circle"></i>
                    <span sec:authentication="name">usuario</span>
                </span>
                <a th:href="@{/login}"  class="btn-logout" sec:authorize="!isAuthenticated()">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Acceder
                </a>
                <a th:href="@{/logout}" class="btn-logout" sec:authorize="isAuthenticated()">
                    <i class="bi bi-box-arrow-right me-1"></i>Salir
                </a>
            </div>
        </div>
    </nav>

    <div class="page-hero">
        <div class="container">
            <p class="hero-eyebrow">Planificación de rutas</p>
            <h1 class="page-title">
                <i th:class="${operacion.id == null} ? 'bi bi-calendar-plus me-2' : 'bi bi-pencil-square me-2'"
                   th:style="${operacion.id == null} ? 'color:var(--verde); font-size:1.5rem;' : 'color:var(--amarillo); font-size:1.5rem;'"></i>
                <span th:text="${operacion.id == null} ? 'Planificar Servicio' : 'Modificar Servicio'"></span>
            </h1>
        </div>
    </div>

    <div class="dash-body">
        <div class="form-container-dark">

            <!-- Peso excedido / Solapamiento -->
			<div th:if="${error}" class="alert alert-danger d-flex align-items-center mb-4 shadow-sm fs-6 fw-semibold" role="alert">
			    <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
			    <span th:text="${error}">Error</span>
			</div>

            <div class="card shadow-sm p-4">
                <p class="section-label mb-4"><i class="bi bi-geo-alt me-2"></i>Detalles del Servicio</p>

                <form th:action="@{/operaciones/guardar}" th:object="${operacion}" method="POST"
                      id="formOperacion" onsubmit="return validarFormulario()">

                    <input type="hidden" th:field="*{id}" />

                    <!-- Envío -->
                    <div class="mb-3">
                        <label class="form-label">Asignar Envío (Código):</label>
                        <select id="envio" name="envio" class="form-select"
                                th:classappend="${#fields.hasErrors('envio')} ? 'is-invalid'">
                            <option value="">-- Selecciona el envío --</option>
                            <option th:each="ev : ${envios}"
                                    th:value="${ev.id}"
                                    th:text="${ev.codigo}"
                                    th:selected="${operacion.envio != null && operacion.envio.id == ev.id}">
                            </option>
                        </select>
                        <div class="invalid-feedback"
                             th:if="${#fields.hasErrors('envio')}"
                             th:errors="*{envio}">Error</div>
                    </div>

                    <!-- Vehículo -->
                    <div class="mb-3">
                        <label class="form-label">Asignar Vehículo (Matrícula):</label>
                        <select id="vehiculo" name="vehiculo" class="form-select"
                                th:classappend="${#fields.hasErrors('vehiculo')} ? 'is-invalid'">
                            <option value="">-- Selecciona el vehículo --</option>
                            <option th:each="vh : ${vehiculos}"
                                    th:value="${vh.id}"
                                    th:text="${vh.matricula + ' (libre: ' + #numbers.formatDecimal(capacidadesDisponibles[vh.id], 1, 2) + ' kg / cap: ' + vh.capacidad + ' kg)'}"
                                    th:selected="${operacion.vehiculo != null && operacion.vehiculo.id == vh.id}">
                            </option>
                        </select>
                        <div class="invalid-feedback"
                             th:if="${#fields.hasErrors('vehiculo')}"
                             th:errors="*{vehiculo}">Error</div>
                    </div>

                    <!-- Fecha -->
                    <div class="mb-3">
                        <label class="form-label">Fecha:</label>
                        <input type="date" id="fecha"
                               th:field="*{fecha}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('fecha')} ? 'is-invalid'" />
                        <div class="invalid-feedback"
                             th:if="${#fields.hasErrors('fecha')}"
                             th:errors="*{fecha}">Error</div>
                    </div>

                    <!-- Lugar -->
                    <div class="mb-3">
                        <label class="form-label">Punto de Control / Lugar:</label>
                        <input type="text" id="lugar"
                               th:field="*{lugar}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('lugar')} ? 'is-invalid'"
                               placeholder="Ej. Almacén Central o Aeropuerto de Sevilla" />
                        <div class="invalid-feedback"
                             th:if="${#fields.hasErrors('lugar')}"
                             th:errors="*{lugar}">Error</div>
                    </div>

                    <!-- Distancia -->
                    <div class="mb-3">
                        <label class="form-label">Distancia del segmento (km):</label>
                        <div class="input-group">
                            <input type="number" step="0.1" min="0" id="distancia"
                                   th:field="*{distancia}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('distancia')} ? 'is-invalid'" />
                            <span class="input-group-text">km</span>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('distancia')}"
                                 th:errors="*{distancia}">Error</div>
                        </div>
                        <div class="form-text mt-2">
                            <i class="bi bi-info-circle me-1"></i>El coste se calcula automáticamente: peso × distancia × 0,02 €
                        </div>
                    </div>

                    <!-- Estado -->
                    <div class="mb-4">
                        <label class="form-label">Estado del Seguimiento:</label>
                        <select id="estado" th:field="*{estado}" class="form-select"
                                th:classappend="${#fields.hasErrors('estado')} ? 'is-invalid'">
                            <option value="">-- Selecciona el estado --</option>
                            <option value="PREPARADO">PREPARADO</option>
                            <option value="EN_RUTA">EN RUTA</option>
                            <option value="EN_REPARTO">EN REPARTO</option>
                            <option value="ENTREGADO">ENTREGADO</option>
                        </select>
                        <div class="invalid-feedback"
                             th:if="${#fields.hasErrors('estado')}"
                             th:errors="*{estado}">Error</div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center border-top pt-3 mt-4"
                         style="border-color: var(--gris-borde) !important;">
                        <a th:href="@{/operaciones}" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">Cancelar</a>
                        <button type="submit" class="btn"
                                th:classappend="${operacion.id == null} ? 'btn-success d-inline-flex align-items-center gap-2 fw-bold' : 'btn-primary d-inline-flex align-items-center gap-2 fw-bold'"
                                th:style="${operacion.id != null} ? 'background:var(--amarillo); border-color:var(--amarillo); color:var(--carbon); font-weight:700;' : ''"
                                th:text="${operacion.id == null} ? 'Registrar Servicio' : 'Actualizar Servicio'">
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script>
        // Validación frontend 

        function validarFormulario() {
            let valido = true;

            // Envío seleccionado
            valido = validarSelect('envio', 'Debes seleccionar un envío.') && valido;

            // Vehículo seleccionado
            valido = validarSelect('vehiculo', 'Debes seleccionar un vehículo.') && valido;

            // Fecha
            const fechaInput = document.getElementById('fecha');
            if (!fechaInput.value) {
                mostrarError(fechaInput, 'La fecha es obligatoria.');
                valido = false;
            } else {
                quitarError(fechaInput);
            }

            // Lugar
            const lugarInput = document.getElementById('lugar');
            if (!lugarInput.value.trim()) {
                mostrarError(lugarInput, 'El punto de control es obligatorio.');
                valido = false;
            } else if (lugarInput.value.trim().length > 200) {
                mostrarError(lugarInput, 'El lugar no puede superar los 200 caracteres.');
                valido = false;
            } else {
                quitarError(lugarInput);
            }

            // Distancia
            const distanciaInput = document.getElementById('distancia');
            const distancia = parseFloat(distanciaInput.value);
            if (!distanciaInput.value) {
                mostrarError(distanciaInput, 'La distancia es obligatoria.');
                valido = false;
            } else if (isNaN(distancia) || distancia <= 0) {
                mostrarError(distanciaInput, 'La distancia debe ser mayor que 0.');
                valido = false;
            } else {
                quitarError(distanciaInput);
            }

            // Estado
            valido = validarSelect('estado', 'Debes seleccionar un estado.') && valido;

            return valido;
        }

        function validarSelect(id, mensaje) {
            const select = document.getElementById(id);
            if (!select.value) {
                select.classList.add('is-invalid');
                const feedback = select.nextElementSibling;
                if (feedback && feedback.classList.contains('invalid-feedback')) {
                    feedback.textContent = mensaje;
                }
                return false;
            }
            select.classList.remove('is-invalid');
            return true;
        }

        function mostrarError(input, mensaje) {
            input.classList.add('is-invalid');
            let feedback = input.nextElementSibling;
            if (feedback && feedback.classList.contains('input-group-text')) {
                feedback = feedback.nextElementSibling;
            }
            if (feedback && feedback.classList.contains('invalid-feedback')) {
                feedback.textContent = mensaje;
            }
        }

        function quitarError(input) {
            input.classList.remove('is-invalid');
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
