<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSur Express - Envíos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}"><i class="bi bi-truck me-2"></i>TransSur Express</a>
            <div class="d-flex gap-2">
                <a th:href="@{/operaciones}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Operaciones
                </a>
                <a th:href="@{/}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-house-door me-1"></i>Inicio
                </a>
                <a th:href="@{/vehiculos}" class="btn btn-outline-light btn-sm">
                    Vehículos<i class="bi bi-arrow-right ms-1"></i>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary"><i class="bi bi-box-seam me-2"></i>Gestión de Envíos</h2>
            <a th:href="@{/envios/nuevo}" class="btn btn-success">
                <i class="bi bi-plus-circle me-1"></i> Nuevo Envío
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0 text-center align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Código</th>
                                <th>Origen</th>
                                <th>Destino</th>
                                <th>Peso</th>
                                <th>Coste</th>
                                <th sec:authorize="hasRole('ADMINISTRADOR')">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="envio : ${envios}">
                                <td th:text="${envio.id}"></td>
                                <td th:text="${envio.codigo}" class="fw-bold"></td>
                                <td th:text="${envio.origen}"></td>
                                <td th:text="${envio.destino}"></td>
                                <td><span th:text="${envio.peso}"></span> kg</td>
                                <td><span th:text="${envio.coste}"></span> €</td>
                                <td sec:authorize="hasRole('ADMINISTRADOR')">
                                    <a th:href="@{/envios/editar/{id}(id=${envio.id})}"
                                       class="btn btn-warning btn-sm">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/envios/borrar/{id}(id=${envio.id})}"
                                       class="btn btn-danger btn-sm"
                                       th:data-codigo="${envio.codigo}"
                                       onclick="return confirmarBorrado(this.getAttribute('data-codigo'));">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(envios)}">
                                <td colspan="7" class="text-muted p-4">No hay envíos registrados en el sistema.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast de notificación -->
    <div th:replace="~{fragments/toast :: notificacion}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function confirmarBorrado(codigo) {
            return confirm('¿Estás seguro de que deseas eliminar el envío ' + codigo + '? Esta acción no se puede deshacer.');
        }
    </script>
</body>
</html>
