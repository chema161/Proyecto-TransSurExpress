<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSur Express - Formulario Completo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    
                    <div class="card-header py-3" th:classappend="${envio.id == null} ? 'bg-success text-white' : 'bg-warning text-dark'">
                        <h4 class="mb-0">
                            <i th:class="${envio.id == null} ? 'bi bi-plus-circle me-2' : 'bi bi-pencil-square me-2'"></i>
                            <span th:text="${envio.id == null} ? 'Registrar Nuevo Envío' : 'Modificar Datos del Envío'"></span>
                        </h4>
                    </div>
                    
                    <div class="card-body p-4">
                        <form th:action="@{/envios/guardar}" th:object="${envio}" method="POST">
                            
                            <input type="hidden" th:field="*{id}" />
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Código de Envío</label>
                                <input type="text" class="form-control" th:field="*{codigo}" th:readonly="${envio.id != null}" placeholder="Ej: 12345678" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Origen</label>
                                    <input type="text" class="form-control" th:field="*{origen}" placeholder="Ej: Madrid" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Destino</label>
                                    <input type="text" class="form-control" th:field="*{destino}" placeholder="Ej: Castilleja" required>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Peso (kg)</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{peso}" placeholder="0.00" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Coste (€)</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{coste}" placeholder="0.00" required>
                                </div>
                            </div>
                            
                            <div class="d-flex justify-content-between align-items-center border-top pt-3">
                                
                                <div>
                                    <a th:if="${envio.id != null}" 
                                       th:href="@{/envios/borrar/{id}(id=${envio.id})}" 
                                       class="btn btn-danger"
                                       th:data-codigo="${envio.codigo}"
                                       onclick="return solicitarConfirmacion(this.getAttribute('data-codigo'));">
                                        <i class="bi bi-trash3-fill me-1"></i> Eliminar Envío
                                    </a>
                                </div>
                                
                                <div class="d-flex gap-2">
                                    <a th:href="@{/envios}" class="btn btn-outline-secondary">Cancelar</a>
                                    <button type="submit" class="btn" th:classappend="${envio.id == null} ? 'btn-success' : 'btn-warning'"
                                            th:text="${envio.id == null} ? 'Registrar Envío' : 'Actualizar Datos'">
                                    </button>
                                </div>
                                
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function solicitarConfirmacion(codigo) {
            return confirm("¿Estás seguro de que deseas eliminar este envío? Esta acción no se puede deshacer.");
        }
    </script>
</body>
</html>
