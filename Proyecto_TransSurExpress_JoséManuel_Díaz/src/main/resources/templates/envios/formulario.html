<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSur Express — Ficha de Envío</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
    <link th:href="@{/css/index.css}" rel="stylesheet">
    <link th:href="@{/css/lista-dark.css}" rel="stylesheet">
</head>
<body>

    <nav class="navbar-dash">
        <div class="container d-flex align-items-center gap-3">
            <a class="nav-brand me-3" th:href="@{/}">
                <i class="bi bi-truck-front-fill"></i>
                TransSur<span class="accent">Express</span>
            </a>
            <div class="d-flex gap-1 flex-wrap">
                <a th:href="@{/envios}"      class="nav-link-pill active"><i class="bi bi-box-seam me-1"></i>Envíos</a>
                <a th:href="@{/vehiculos}"   class="nav-link-pill"><i class="bi bi-truck me-1"></i>Vehículos</a>
                <a th:href="@{/conductores}" class="nav-link-pill"><i class="bi bi-person-badge me-1"></i>Conductores</a>
                <a th:href="@{/operaciones}" class="nav-link-pill"><i class="bi bi-geo-alt me-1"></i>Operaciones</a>
            </div>
            <div class="ms-auto d-flex align-items-center gap-2">
                <span class="nav-user" sec:authorize="isAuthenticated()">
                    <i class="bi bi-person-circle"></i>
                    <span sec:authentication="name">usuario</span>
                </span>
                <a th:href="@{/login}"  class="btn-logout" sec:authorize="!isAuthenticated()">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Acceder
                </a>
                <a th:href="@{/logout}" class="btn-logout" sec:authorize="isAuthenticated()">
                    <i class="bi bi-box-arrow-right me-1"></i>Salir
                </a>
            </div>
        </div>
    </nav>

    <div class="page-hero">
        <div class="container">
            <p class="hero-eyebrow">Registro de paquetes</p>
            <h1 class="page-title">
                <i th:class="${envio.id == null} ? 'bi bi-plus-circle me-2' : 'bi bi-pencil-square me-2'"
                   th:style="${envio.id == null} ? 'color:var(--verde); font-size:1.5rem;' : 'color:var(--amarillo); font-size:1.5rem;'"></i>
                <span th:text="${envio.id == null} ? 'Nuevo Envío' : 'Modificar Envío'"></span>
            </h1>
        </div>
    </div>

    <div class="dash-body">
        <div class="form-container-dark">

            <!-- Código duplicado u otros errores -->
            <div th:if="${error}" class="alert-danger-dark d-flex align-items-center mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
                <span th:text="${error}">Error</span>
            </div>

            <div class="form-dark-card">
                <p class="section-label mb-4"><i class="bi bi-box-seam me-2"></i>Detalles del Paquete</p>

                <form th:action="@{/envios/guardar}" th:object="${envio}" method="POST"
                      id="formEnvio" onsubmit="return validarFormulario()">

                    <input type="hidden" th:field="*{id}" />

                    <!-- Código -->
                    <div class="mb-3">
                        <label class="form-label">Código de Envío</label>
                        <input type="text" id="codigo"
                               class="form-control"
                               th:field="*{codigo}"
                               th:classappend="${#fields.hasErrors('codigo')} ? 'is-invalid'"
                               th:readonly="${envio.id != null}"
                               placeholder="Ej: ENV-2026-001" />
                        <div class="invalid-feedback"
                             th:if="${#fields.hasErrors('codigo')}"
                             th:errors="*{codigo}">Error</div>
                    </div>

                    <!-- Origen / Destino -->
                    <div class="row mb-3">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label class="form-label">Origen</label>
                            <input type="text" id="origen"
                                   class="form-control"
                                   th:field="*{origen}"
                                   th:classappend="${#fields.hasErrors('origen')} ? 'is-invalid'"
                                   placeholder="Ej: Sevilla" />
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('origen')}"
                                 th:errors="*{origen}">Error</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Destino</label>
                            <input type="text" id="destino"
                                   class="form-control"
                                   th:field="*{destino}"
                                   th:classappend="${#fields.hasErrors('destino')} ? 'is-invalid'"
                                   placeholder="Ej: Madrid" />
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('destino')}"
                                 th:errors="*{destino}">Error</div>
                        </div>
                    </div>

                    <!-- Peso / Coste -->
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label class="form-label">Peso (kg)</label>
                            <div class="input-group">
                                <input type="number" step="0.01" id="peso"
                                       class="form-control"
                                       th:field="*{peso}"
                                       th:classappend="${#fields.hasErrors('peso')} ? 'is-invalid'"
                                       placeholder="0.00" />
                                <span class="input-group-text">kg</span>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('peso')}"
                                     th:errors="*{peso}">Error</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Coste (€)</label>
                            <div class="input-group">
                                <input type="number" step="0.01" id="coste"
                                       class="form-control"
                                       th:field="*{coste}"
                                       th:classappend="${#fields.hasErrors('coste')} ? 'is-invalid'"
                                       placeholder="0.00" />
                                <span class="input-group-text">€</span>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('coste')}"
                                     th:errors="*{coste}">Error</div>
                            </div>
                            <div class="form-text mt-2">
                                <i class="bi bi-info-circle me-1"></i>Se recalcula automáticamente al asignar rutas
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center border-top pt-3"
                         style="border-color: var(--gris-borde) !important;">
                        <div>
                            <a th:if="${envio.id != null}"
                               th:href="@{/envios/borrar/{id}(id=${envio.id})}"
                               class="btn btn-action danger"
                               th:data-codigo="${envio.codigo}"
                               onclick="return solicitarConfirmacion(this.getAttribute('data-codigo'));">
                                <i class="bi bi-trash3-fill me-1"></i> Eliminar Envío
                            </a>
                        </div>
                        <div class="d-flex gap-2">
                            <a th:href="@{/envios}" class="btn-volver-dark">Cancelar</a>
                            <button type="submit" class="btn"
                                    th:classappend="${envio.id == null} ? 'btn-success-dark' : 'btn-primary-dark'"
                                    th:style="${envio.id != null} ? 'background:var(--amarillo); border-color:var(--amarillo); color:var(--carbon); font-weight:700;' : ''"
                                    th:text="${envio.id == null} ? 'Registrar Envío' : 'Actualizar Datos'">
                            </button>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script>
        // Validación frontend 

        function validarFormulario() {
            let valido = true;

            // Código (solo al crear)
            const codigoInput = document.getElementById('codigo');
            if (!codigoInput.readOnly) {
                const codigo = codigoInput.value.trim();
                if (!codigo) {
                    mostrarError(codigoInput, 'El código de envío es obligatorio.');
                    valido = false;
                } else if (codigo.length < 3) {
                    mostrarError(codigoInput, 'El código debe tener al menos 3 caracteres.');
                    valido = false;
                } else {
                    quitarError(codigoInput);
                }
            }

            // Origen
            valido = validarTextoObligatorio('origen', 'El origen es obligatorio.') && valido;

            // Destino
            valido = validarTextoObligatorio('destino', 'El destino es obligatorio.') && valido;

            // Origen ≠ Destino
            const origen = document.getElementById('origen').value.trim().toLowerCase();
            const destino = document.getElementById('destino').value.trim().toLowerCase();
            if (origen && destino && origen === destino) {
                mostrarError(document.getElementById('destino'), 'El destino no puede ser igual que el origen.');
                valido = false;
            }

            // Peso
            const pesoInput = document.getElementById('peso');
            const peso = parseFloat(pesoInput.value);
            if (!pesoInput.value) {
                mostrarError(pesoInput, 'El peso es obligatorio.');
                valido = false;
            } else if (isNaN(peso) || peso <= 0) {
                mostrarError(pesoInput, 'El peso debe ser mayor que 0.');
                valido = false;
            } else {
                quitarError(pesoInput);
            }

            // Coste
            const costeInput = document.getElementById('coste');
            const coste = parseFloat(costeInput.value);
            if (!costeInput.value) {
                mostrarError(costeInput, 'El coste es obligatorio.');
                valido = false;
            } else if (isNaN(coste) || coste < 0) {
                mostrarError(costeInput, 'El coste no puede ser negativo.');
                valido = false;
            } else {
                quitarError(costeInput);
            }

            return valido;
        }

        function validarTextoObligatorio(id, mensaje) {
            const input = document.getElementById(id);
            if (!input.value.trim()) {
                mostrarError(input, mensaje);
                return false;
            }
            quitarError(input);
            return true;
        }

        function mostrarError(input, mensaje) {
            input.classList.add('is-invalid');
            // Buscar el div.invalid-feedback más cercano
            let feedback = input.nextElementSibling;
            if (feedback && feedback.classList.contains('input-group-text')) {
                feedback = feedback.nextElementSibling;
            }
            if (feedback && feedback.classList.contains('invalid-feedback')) {
                feedback.textContent = mensaje;
            }
        }

        function quitarError(input) {
            input.classList.remove('is-invalid');
        }

        function solicitarConfirmacion(codigo) {
            return confirm('¿Estás seguro de que deseas eliminar el envío ' + codigo + '? Esta acción no se puede deshacer.');
        }
    </script>
</body>
</html>
