<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSur Express — Ficha de Conductor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
    <link th:href="@{/css/index.css}" rel="stylesheet">
    <link th:href="@{/css/lista.css}" rel="stylesheet">
</head>
<body data-bs-theme="light">

    <nav class="navbar-dash">
        <div class="container d-flex align-items-center gap-3">
            <a class="nav-brand me-3" th:href="@{/}">
                <i class="bi bi-truck-front-fill"></i>
                TransSur<span class="accent">Express</span>
            </a>
            <div class="d-flex gap-3 flex-wrap">
                <a th:href="@{/envios}"      class="nav-link-pill"><i class="bi bi-box-seam me-1"></i>Envíos</a>
                <a th:href="@{/vehiculos}"   class="nav-link-pill"><i class="bi bi-truck me-1"></i>Vehículos</a>
                <a th:href="@{/conductores}" class="nav-link-pill active"><i class="bi bi-person-badge me-1"></i>Conductores</a>
                <a th:href="@{/operaciones}" class="nav-link-pill"><i class="bi bi-geo-alt me-1"></i>Operaciones</a>
            </div>
            <div class="ms-auto d-flex align-items-center gap-2">
                <span class="nav-user" sec:authorize="isAuthenticated()">
                    <i class="bi bi-person-circle"></i>
                    <span sec:authentication="name">usuario</span>
                </span>
                <a th:href="@{/login}"  class="btn-logout" sec:authorize="!isAuthenticated()">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Acceder
                </a>
                <a th:href="@{/logout}" class="btn-logout" sec:authorize="isAuthenticated()">
                    <i class="bi bi-box-arrow-right me-1"></i>Salir
                </a>
            </div>
        </div>
    </nav>

    <div class="page-hero">
        <div class="container">
            <p class="hero-eyebrow">Gestión de personal</p>
            <h1 class="page-title">
                <i th:class="${conductor.id == null} ? 'bi bi-person-plus-fill me-2' : 'bi bi-pencil-square me-2'"
                   th:style="${conductor.id == null} ? 'color:var(--verde); font-size:1.5rem;' : 'color:var(--amarillo); font-size:1.5rem;'"></i>
                <span th:text="${conductor.id == null} ? 'Alta de Conductor' : 'Modificar Conductor'"></span>
            </h1>
        </div>
    </div>

    <div class="dash-body">
        <div class="form-container-dark">
            <div class="card shadow-sm p-4">
                <p class="section-label mb-4"><i class="bi bi-card-list me-2"></i>Ficha del Conductor</p>

                <form th:action="@{/conductores/guardar}" th:object="${conductor}" method="POST"
                      id="formConductor" onsubmit="return validarFormulario()">

                    <input type="hidden" th:field="*{id}" />
                    <input type="hidden" th:field="*{activo}" />

                    <div class="mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="nombre" class="form-control"
                               th:field="*{nombre}"
                               th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                               th:readonly="${conductor.id != null}"
                               placeholder="Ej: Juan Pérez García" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">Error</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Años de Experiencia</label>
                        <input type="number" id="experiencia" class="form-control"
                               th:field="*{experiencia}"
                               th:classappend="${#fields.hasErrors('experiencia')} ? 'is-invalid'"
                               min="0" max="50"
                               placeholder="Ej: 5" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('experiencia')}" th:errors="*{experiencia}">Error</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Vehículo Asignado</label>
                        <select class="form-select" name="vehiculo" id="vehiculo">
                            <option value="">-- Sin vehículo asignado temporalmente --</option>
                            <option th:each="v : ${vehiculos}"
                                    th:value="${v.id}"
                                    th:text="${v.matricula}"
                                    th:selected="${conductor.vehiculo != null && conductor.vehiculo.id == v.id}">
                            </option>
                        </select>
                        <div class="form-text mt-2">
                            <i class="bi bi-info-circle me-1"></i>Campo opcional
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center border-top pt-3"
                         style="border-color: var(--gris-borde) !important;">
                        <div>
                            <a th:if="${conductor.id != null}"
                               th:href="@{/conductores/borrar/{id}(id=${conductor.id})}"
                               class="btn btn-sm btn-outline-danger d-inline-flex align-items-center gap-1"
                               th:data-nombre="${conductor.nombre}"
                               onclick="return asegurarBajaPersonal(this.getAttribute('data-nombre'));">
                                <i class="bi bi-person-x-fill me-1"></i> Dar de Baja
                            </a>
                        </div>
                        <div class="d-flex gap-2">
                            <a th:href="@{/conductores}" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">Cancelar</a>
                            <button type="submit" class="btn"
                                    th:classappend="${conductor.id == null} ? 'btn-success d-inline-flex align-items-center gap-2 fw-bold' : 'btn-primary d-inline-flex align-items-center gap-2 fw-bold'"
                                    th:style="${conductor.id != null} ? 'background:var(--amarillo); border-color:var(--amarillo); color:var(--carbon); font-weight:700;' : ''"
                                    th:text="${conductor.id == null} ? 'Registrar Conductor' : 'Actualizar Ficha'">
                            </button>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script>
        function validarFormulario() {
            let valido = true;
            const nombreInput = document.getElementById('nombre');
            if (!nombreInput.readOnly) {
                const nombre = nombreInput.value.trim();
                if (!nombre) { mostrarError(nombreInput, 'El nombre es obligatorio.'); valido = false; }
                else if (nombre.length < 3) { mostrarError(nombreInput, 'El nombre debe tener al menos 3 caracteres.'); valido = false; }
                else if (nombre.length > 100) { mostrarError(nombreInput, 'El nombre no puede superar los 100 caracteres.'); valido = false; }
                else { quitarError(nombreInput); }
            }
            const expInput = document.getElementById('experiencia');
            const exp = parseInt(expInput.value);
            if (expInput.value === '') { mostrarError(expInput, 'Los años de experiencia son obligatorios.'); valido = false; }
            else if (isNaN(exp) || exp < 0) { mostrarError(expInput, 'La experiencia no puede ser negativa.'); valido = false; }
            else if (exp > 50) { mostrarError(expInput, 'La experiencia no puede superar los 50 años.'); valido = false; }
            else { quitarError(expInput); }
            return valido;
        }
        function mostrarError(input, mensaje) {
            input.classList.add('is-invalid');
            const feedback = input.nextElementSibling;
            if (feedback && feedback.classList.contains('invalid-feedback')) feedback.textContent = mensaje;
        }
        function quitarError(input) { input.classList.remove('is-invalid'); }
        function asegurarBajaPersonal(nombreCompleto) {
            return confirm("¿Estás completamente seguro de que deseas dar de baja al conductor '" + nombreCompleto + "'?\nEsta acción eliminará su ficha de la base de datos.");
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
