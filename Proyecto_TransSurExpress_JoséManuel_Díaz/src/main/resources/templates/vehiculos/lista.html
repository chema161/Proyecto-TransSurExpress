<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSur Express — Flota de Vehículos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
    <link th:href="@{/css/index.css}" rel="stylesheet">
    <link th:href="@{/css/lista.css}" rel="stylesheet">
</head>
<body data-bs-theme="light">

    <nav class="navbar-dash">
        <div class="container d-flex align-items-center gap-3">
            <a class="nav-brand me-3" th:href="@{/}">
                <i class="bi bi-truck-front-fill"></i>
                TransSur<span class="accent">Express</span>
            </a>
            <div class="d-flex gap-3 flex-wrap">
                <a th:href="@{/envios}"      class="nav-link-pill"><i class="bi bi-box-seam me-1"></i>Envíos</a>
                <a th:href="@{/vehiculos}"   class="nav-link-pill active"><i class="bi bi-truck me-1"></i>Vehículos</a>
                <a th:href="@{/conductores}" class="nav-link-pill"><i class="bi bi-person-badge me-1"></i>Conductores</a>
                <a th:href="@{/operaciones}" class="nav-link-pill"><i class="bi bi-geo-alt me-1"></i>Operaciones</a>
            </div>
            <div class="ms-auto d-flex align-items-center gap-2">
                <span class="nav-user" sec:authorize="isAuthenticated()">
                    <i class="bi bi-person-circle"></i>
                    <span sec:authentication="name">usuario</span>
                </span>
                <a th:href="@{/login}"  class="btn-logout" sec:authorize="!isAuthenticated()">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Acceder
                </a>
                <a th:href="@{/logout}" class="btn-logout" sec:authorize="isAuthenticated()">
                    <i class="bi bi-box-arrow-right me-1"></i>Salir
                </a>
            </div>
        </div>
    </nav>

    <div class="page-hero">
        <div class="container">
            <p class="hero-eyebrow">Gestión de flota</p>
            <h1 class="page-title">
                <i class="bi bi-truck-front-fill me-2" style="color:var(--verde); font-size:1.5rem;"></i>
                Control de Flota
            </h1>
        </div>
    </div>

    <div class="dash-body">
        <div class="container">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <p class="section-label mb-0">Vehículos registrados</p>
                <a th:href="@{/vehiculos/nuevo}" class="btn btn-success d-inline-flex align-items-center gap-2 fw-bold">
                    <i class="bi bi-plus-lg"></i> Alta de Vehículo
                </a>
            </div>

            <div class="card shadow-sm overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Matrícula</th>
                                <th>Cap. Máxima</th>
                                <th>Cap. Disponible</th>
                                <th sec:authorize="hasRole('ADMINISTRADOR')">Estado</th>
                                <th sec:authorize="hasRole('ADMINISTRADOR')">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="vehiculo : ${vehiculos}"
                                th:classappend="${!vehiculo.activo} ? 'row-inactive'">
                                <td><span class="val-id" th:text="${vehiculo.id}"></span></td>
                                <td><span class="val-green" th:text="${vehiculo.matricula}"></span></td>
                                <td><span class="val-mono" th:text="${vehiculo.capacidad + ' kg'}"></span></td>
                                <td>
                                    <span class="val-cap"
                                          th:text="${#numbers.formatDecimal(capacidadesDisponibles[vehiculo.id], 1, 2) + ' kg'}">
                                    </span>
                                </td>
                                <td sec:authorize="hasRole('ADMINISTRADOR')">
                                    <span th:if="${vehiculo.activo}"   class="badge rounded-pill text-bg-success">Activo</span>
                                    <span th:unless="${vehiculo.activo}" class="badge rounded-pill text-bg-secondary">Inactivo</span>
                                </td>
                                <td sec:authorize="hasRole('ADMINISTRADOR')">
                                    <div class="d-flex gap-2">
                                        <a th:href="@{/vehiculos/editar/{id}(id=${vehiculo.id})}"
                                           class="btn btn-sm btn-outline-warning d-inline-flex align-items-center gap-1" title="Editar">
                                            <i class="bi bi-pencil-square"></i>
                                        </a>
                                        <a th:if="${vehiculo.activo}"
                                           th:href="@{/vehiculos/borrar/{id}(id=${vehiculo.id})}"
                                           class="btn btn-sm btn-outline-danger d-inline-flex align-items-center gap-1"
                                           th:data-matricula="${vehiculo.matricula}"
                                           onclick="return confirmarBorrado(this.getAttribute('data-matricula'));"
                                           title="Eliminar">
                                            <i class="bi bi-trash3-fill"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(vehiculos)}" class="empty-row">
                                <td colspan="6">
                                    <i class="bi bi-inbox me-2"></i>No hay vehículos dados de alta en el sistema.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <div th:replace="~{fragments/toast :: notificacion}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function confirmarBorrado(matricula) {
            return confirm('¿Estás seguro de que quieres eliminar el vehículo ' + matricula + '?\nEsta acción podría desvincular rutas y conductores asociados.');
        }
    </script>
</body>
</html>
