<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSur Express - Flota de Vehículos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-truck me-2"></i>TransSur Express</a>
            <div class="d-flex gap-2">
                <a th:href="@{/envios}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Envíos
                </a>
                <a th:href="@{/}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-house-door me-1"></i>Volver al inicio
                </a>
                <a th:href="@{/conductores}" class="btn btn-outline-light btn-sm">
                    Conductores<i class="bi bi-arrow-right ms-1"></i>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-success mb-0"><i class="bi bi-truck me-2"></i>Control de Flota</h2>
            <a th:href="@{/vehiculos/nuevo}" class="btn btn-success shadow-sm">
                <i class="bi bi-plus-lg me-1"></i> Alta de Vehículo
            </a>
        </div>

        <div class="card shadow border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0 text-center align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>ID Registro</th>
                                <th>Matrícula Oficial</th>
                                <th>Capacidad de Carga</th>
                                <th>Acciones de Gestión</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="vehiculo : ${vehiculos}">
                                <td th:text="${vehiculo.id}" class="text-muted small"></td>
                                <td th:text="${vehiculo.matricula}" class="fw-bold text-uppercase text-success"></td>
                                <td><span th:text="${vehiculo.capacidad}"></span> kg</td>
                                <td>
                                    <div class="btn-group gap-1">
                                        <a th:href="@{/vehiculos/editar/{id}(id=${vehiculo.id})}" class="btn btn-warning btn-sm shadow-sm" title="Editar">
                                            <i class="bi bi-pencil-square text-dark"></i>
                                        </a>
                                        <a th:href="@{/vehiculos/borrar/{id}(id=${vehiculo.id})}" 
                                           class="btn btn-danger btn-sm shadow-sm" 
                                           th:data-matricula="${vehiculo.matricula}"
                                           onclick="return confirmarBorradoVehiculo(this.getAttribute('data-matricula'));" title="Eliminar">
                                            <i class="bi bi-trash3-fill"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(vehiculos)}">
                                <td colspan="4" class="text-muted p-4">No hay vehículos operativos dados de alta en el sistema.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function confirmarBorradoVehiculo(matricula) {
            return confirm("¿Estás seguro de que quieres eliminar permanentemente el vehículo con matrícula " + matricula + "?\nEsta acción podría desvincular rutas y conductores asociados.");
        }
    </script>
</body>
</html>
