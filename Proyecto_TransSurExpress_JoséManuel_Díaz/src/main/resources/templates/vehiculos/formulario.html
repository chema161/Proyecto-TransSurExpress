<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSur Express — Ficha de Vehículo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
    <link th:href="@{/css/index.css}" rel="stylesheet">
    <link th:href="@{/css/lista.css}" rel="stylesheet">
</head>
<body data-bs-theme="light">

    <nav class="navbar-dash">
        <div class="container d-flex align-items-center gap-3">
            <a class="nav-brand me-3" th:href="@{/}">
                <i class="bi bi-truck-front-fill"></i>
                TransSur<span class="accent">Express</span>
            </a>
            <div class="d-flex gap-3 flex-wrap">
                <a th:href="@{/envios}"      class="nav-link-pill"><i class="bi bi-box-seam me-1"></i>Envíos</a>
                <a th:href="@{/vehiculos}"   class="nav-link-pill active"><i class="bi bi-truck me-1"></i>Vehículos</a>
                <a th:href="@{/conductores}" class="nav-link-pill"><i class="bi bi-person-badge me-1"></i>Conductores</a>
                <a th:href="@{/operaciones}" class="nav-link-pill"><i class="bi bi-geo-alt me-1"></i>Operaciones</a>
            </div>
            <div class="ms-auto d-flex align-items-center gap-2">
                <span class="nav-user" sec:authorize="isAuthenticated()">
                    <i class="bi bi-person-circle"></i>
                    <span sec:authentication="name">usuario</span>
                </span>
                <a th:href="@{/login}"  class="btn-logout" sec:authorize="!isAuthenticated()">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Acceder
                </a>
                <a th:href="@{/logout}" class="btn-logout" sec:authorize="isAuthenticated()">
                    <i class="bi bi-box-arrow-right me-1"></i>Salir
                </a>
            </div>
        </div>
    </nav>

    <div class="page-hero">
        <div class="container">
            <p class="hero-eyebrow">Gestión de flota</p>
            <h1 class="page-title">
                <i th:class="${vehiculo.id == null} ? 'bi bi-plus-circle me-2' : 'bi bi-pencil-square me-2'"
                   th:style="${vehiculo.id == null} ? 'color:var(--verde); font-size:1.5rem;' : 'color:var(--amarillo); font-size:1.5rem;'"></i>
                <span th:text="${vehiculo.id == null} ? 'Alta de Vehículo' : 'Modificar Vehículo'"></span>
            </h1>
        </div>
    </div>

    <div class="dash-body">
        <div class="form-container-dark">
            <div class="card shadow-sm p-4">
                <p class="section-label mb-4"><i class="bi bi-truck me-2"></i>Ficha del Vehículo</p>

                <form th:action="@{/vehiculos/guardar}" th:object="${vehiculo}" method="POST"
                      id="formVehiculo" onsubmit="return validarFormulario()">

                    <input type="hidden" th:field="*{id}" />
                    <input type="hidden" th:field="*{activo}" />

                    <div class="mb-3">
                        <label class="form-label">Matrícula</label>
                        <input type="text" id="matricula" class="form-control text-uppercase"
                               th:field="*{matricula}"
                               th:classappend="${#fields.hasErrors('matricula')} ? 'is-invalid'"
                               th:readonly="${vehiculo.id != null}"
                               placeholder="Ej: 1234-ABC" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('matricula')}" th:errors="*{matricula}">Error</div>
                        <div class="form-text mt-2" th:unless="${vehiculo.id != null}">
                            <i class="bi bi-info-circle me-1"></i>Formato: 4 dígitos, guion, 3 letras (ej: 1234-ABC)
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Capacidad Máxima de Carga (kg)</label>
                        <div class="input-group">
                            <input type="number" step="0.01" id="capacidad" class="form-control"
                                   th:field="*{capacidad}"
                                   th:classappend="${#fields.hasErrors('capacidad')} ? 'is-invalid'"
                                   placeholder="0.00" />
                            <span class="input-group-text">kg</span>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('capacidad')}" th:errors="*{capacidad}">Error</div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center border-top pt-3"
                         style="border-color: var(--gris-borde) !important;">
                        <div>
                            <a th:if="${vehiculo.id != null}"
                               th:href="@{/vehiculos/borrar/{id}(id=${vehiculo.id})}"
                               class="btn btn-sm btn-outline-danger d-inline-flex align-items-center gap-1"
                               th:data-matricula="${vehiculo.matricula}"
                               onclick="return asegurarEliminacion(this.getAttribute('data-matricula'));">
                                <i class="bi bi-trash3-fill me-1"></i> Eliminar Vehículo
                            </a>
                        </div>
                        <div class="d-flex gap-2">
                            <a th:href="@{/vehiculos}" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">Cancelar</a>
                            <button type="submit" class="btn"
                                    th:classappend="${vehiculo.id == null} ? 'btn-success d-inline-flex align-items-center gap-2 fw-bold' : 'btn-primary d-inline-flex align-items-center gap-2 fw-bold'"
                                    th:style="${vehiculo.id != null} ? 'background:var(--amarillo); border-color:var(--amarillo); color:var(--carbon); font-weight:700;' : ''"
                                    th:text="${vehiculo.id == null} ? 'Registrar Vehículo' : 'Actualizar Datos'">
                            </button>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script>
        function validarFormulario() {
            let valido = true;
            const matriculaInput = document.getElementById('matricula');
            if (!matriculaInput.readOnly) {
                const matricula = matriculaInput.value.trim().toUpperCase();
                const patron = /^\d{4}-[A-Z]{3}$/;
                if (!matricula) { mostrarError(matriculaInput, 'La matrícula es obligatoria.'); valido = false; }
                else if (!patron.test(matricula)) { mostrarError(matriculaInput, 'Formato incorrecto. Usa el formato: 1234-ABC'); valido = false; }
                else { quitarError(matriculaInput); matriculaInput.value = matricula; }
            }
            const capInput = document.getElementById('capacidad');
            const capacidad = parseFloat(capInput.value);
            if (!capInput.value) { mostrarError(capInput, 'La capacidad es obligatoria.'); valido = false; }
            else if (isNaN(capacidad) || capacidad <= 0) { mostrarError(capInput, 'La capacidad debe ser un número mayor que 0.'); valido = false; }
            else { quitarError(capInput); }
            return valido;
        }
        function mostrarError(input, mensaje) {
            input.classList.add('is-invalid');
            let feedback = input.nextElementSibling;
            if (feedback && feedback.classList.contains('input-group-text')) feedback = feedback.nextElementSibling;
            if (feedback && feedback.classList.contains('invalid-feedback')) feedback.textContent = mensaje;
        }
        function quitarError(input) { input.classList.remove('is-invalid'); }
        function asegurarEliminacion(matricula) {
            return confirm('¿Estás seguro de que quieres eliminar permanentemente el vehículo con matrícula ' + matricula + '?\nEsta acción podría desvincular rutas y conductores asociados.');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
