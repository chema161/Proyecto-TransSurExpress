<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSur Express - Formulario Vehículo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-success text-white py-3">
                        <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Registrar Nuevo Vehículo</h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/vehiculos/guardar}" th:object="${vehiculo}" method="POST">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Matrícula</label>
                                <input type="text" class="form-control text-uppercase" th:field="*{matricula}" placeholder="Ej: 1234-ABC" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold">Capacidad Máxima de Carga (kg)</label>
                                <div class="input-group">
                                    <input type="number" step="0.01" class="form-control" th:field="*{capacidad}" placeholder="0.00" required>
                                    <span class="input-group-text">kg</span>
                                </div>
                            </div>
                            
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/vehiculos}" class="btn btn-outline-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-success">Registrar Vehículo</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
