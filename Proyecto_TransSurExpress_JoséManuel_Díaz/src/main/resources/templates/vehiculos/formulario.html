<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSur Express - Gestión de Vehículo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">

                    <div class="card-header py-3"
                         th:classappend="${vehiculo.id == null} ? 'bg-success text-white' : 'bg-warning text-dark'">
                        <h4 class="mb-0">
                            <i th:class="${vehiculo.id == null} ? 'bi bi-plus-circle me-2' : 'bi bi-pencil-square me-2'"></i>
                            <span th:text="${vehiculo.id == null} ? 'Registrar Nuevo Vehículo' : 'Modificar Datos del Vehículo'"></span>
                        </h4>
                    </div>

                    <div class="card-body p-4">
                        <form th:action="@{/vehiculos/guardar}" th:object="${vehiculo}" method="POST"
                              id="formVehiculo" onsubmit="return validarFormulario()">

                            <input type="hidden" th:field="*{id}" />
                            <input type="hidden" th:field="*{activo}" />

                            <!-- Matrícula -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Matrícula</label>
                                <input type="text" id="matricula"
                                       class="form-control text-uppercase"
                                       th:field="*{matricula}"
                                       th:classappend="${#fields.hasErrors('matricula')} ? 'is-invalid'"
                                       th:readonly="${vehiculo.id != null}"
                                       placeholder="Ej: 1234-ABC" />
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('matricula')}"
                                     th:errors="*{matricula}">Error</div>
                                <div class="form-text text-muted" th:unless="${vehiculo.id != null}">
                                    <i class="bi bi-info-circle me-1"></i>Formato: 4 dígitos, guion, 3 letras (ej: 1234-ABC)
                                </div>
                            </div>

                            <!-- Capacidad -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">Capacidad Máxima de Carga (kg)</label>
                                <div class="input-group">
                                    <input type="number" step="0.01" id="capacidad"
                                           class="form-control"
                                           th:field="*{capacidad}"
                                           th:classappend="${#fields.hasErrors('capacidad')} ? 'is-invalid'"
                                           placeholder="0.00" />
                                    <span class="input-group-text">kg</span>
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('capacidad')}"
                                         th:errors="*{capacidad}">Error</div>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center border-top pt-3">
                                <div>
                                    <a th:if="${vehiculo.id != null}"
                                       th:href="@{/vehiculos/borrar/{id}(id=${vehiculo.id})}"
                                       class="btn btn-danger"
                                       th:data-matricula="${vehiculo.matricula}"
                                       onclick="return asegurarEliminacion(this.getAttribute('data-matricula'));">
                                        <i class="bi bi-trash3-fill me-1"></i> Eliminar Vehículo
                                    </a>
                                </div>
                                <div class="d-flex gap-2">
                                    <a th:href="@{/vehiculos}" class="btn btn-outline-secondary">Cancelar</a>
                                    <button type="submit" class="btn"
                                            th:classappend="${vehiculo.id == null} ? 'btn-success' : 'btn-warning'"
                                            th:text="${vehiculo.id == null} ? 'Registrar Vehículo' : 'Actualizar Datos'">
                                    </button>
                                </div>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Validación frontend

        function validarFormulario() {
            let valido = true;

            // Matrícula (crear)
            const matriculaInput = document.getElementById('matricula');
            if (!matriculaInput.readOnly) {
                const matricula = matriculaInput.value.trim().toUpperCase();
                const patron = /^\d{4}-[A-Z]{3}$/;
                if (!matricula) {
                    mostrarError(matriculaInput, 'La matrícula es obligatoria.');
                    valido = false;
                } else if (!patron.test(matricula)) {
                    mostrarError(matriculaInput, 'Formato incorrecto. Usa el formato: 1234-ABC');
                    valido = false;
                } else {
                    quitarError(matriculaInput);
                    matriculaInput.value = matricula; 
                }
            }

            // Capacidad
            const capacidad = parseFloat(document.getElementById('capacidad').value);
            const capInput = document.getElementById('capacidad');
            if (!capInput.value) {
                mostrarError(capInput, 'La capacidad es obligatoria.');
                valido = false;
            } else if (isNaN(capacidad) || capacidad <= 0) {
                mostrarError(capInput, 'La capacidad debe ser un número mayor que 0.');
                valido = false;
            } else {
                quitarError(capInput);
            }

            return valido;
        }

        function mostrarError(input, mensaje) {
            input.classList.add('is-invalid');
            let feedback = input.nextElementSibling;
            // Si el siguiente es el span "kg" del input-group, buscar más
            if (feedback && feedback.classList.contains('input-group-text')) {
                feedback = feedback.nextElementSibling;
            }
            if (feedback && feedback.classList.contains('invalid-feedback')) {
                feedback.textContent = mensaje;
            }
        }

        function quitarError(input) {
            input.classList.remove('is-invalid');
        }

        function asegurarEliminacion(matricula) {
            return confirm('¿Estás seguro de que quieres eliminar permanentemente el vehículo con matrícula '
                + matricula + '?\nEsta acción podría desvincular rutas y conductores asociados.');
        }
    </script>
</body>
</html>
