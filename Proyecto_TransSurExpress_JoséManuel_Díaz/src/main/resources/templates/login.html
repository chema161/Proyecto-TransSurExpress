<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSur Express - Acceso al Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/login.css}" rel="stylesheet">
</head>
<body>

    <div class="panel-login">

        <div class="login-logo">
            <i class="bi bi-truck"></i>
            <span>TransSur<strong>Express</strong></span>
        </div>

        <div class="login-header">
            <div class="eyebrow">Acceso al sistema</div>
            <h2>Iniciar sesión</h2>
            <p>Introduce tus credenciales para continuar</p>
        </div>

        <div th:if="${param.error}" class="alerta-error">
            <i class="bi bi-exclamation-triangle-fill"></i>
            Usuario o contraseña incorrectos. Inténtalo de nuevo.
        </div>

        <div th:if="${param.logout}" class="alerta-logout">
            <i class="bi bi-check-circle-fill"></i>
            Sesión cerrada correctamente.
        </div>

        <form th:action="@{/login}" method="POST">

            <div class="campo">
                <label for="username">Usuario</label>
                <div class="campo-input-wrap">
                    <input type="text" id="username" name="username"
                           placeholder="Introduce tu nombre de usuario"
                           autocomplete="username" required autofocus>
                    <i class="bi bi-person-fill campo-icono"></i>
                </div>
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <div class="campo-input-wrap">
                    <input type="password" id="password" name="password"
                           placeholder="••••••••"
                           autocomplete="current-password" required>
                    <i class="bi bi-lock-fill campo-icono"></i>
                </div>
            </div>

            <button type="submit" class="btn-acceder">
                <i class="bi bi-box-arrow-in-right"></i>
                Acceder al sistema
            </button>

        </form>

        <p class="login-footer">© 2026 TransSur Express · Todos los derechos reservados</p>
    </div>

</body>
</html>
